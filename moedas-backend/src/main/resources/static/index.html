<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeritCoin | Acesso ao Sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-primary: #000000;
            --bg-surface: #0c0c0c;
            --brand-color: #ffffff;
            --accent-color: #d4af37;
            --text-main: #ffffff;
            --border-color: #333333;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background-color: var(--bg-surface) !important;
            border-bottom: 2px solid var(--border-color);
        }

        .card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 16px;
        }

        .auth-container {
            max-width: 520px;
            margin: auto;
            padding: 20px;
            width: 100%;
        }

        .auth-title {
            color: #ffffff !important;
            font-weight: 700;
        }

        /* CORRIGIDO: Legenda do cabeçalho agora bem visível */
        .auth-subtitle {
            color: #f1f5f9 !important;
            font-size: 0.9rem;
        }

        .nav-pills {
            background-color: var(--bg-primary);
            padding: 6px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .nav-pills .nav-link {
            color: #cbd5e1;
            font-weight: 600;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .nav-pills .nav-link.active {
            background-color: var(--brand-color);
            color: #000000;
        }

        /* CORRIGIDO: Autofill e contraste garantido para os inputs */
        .form-control, .form-select {
            background-color: #1a1a1a !important;
            border: 1px solid #444444 !important;
            color: #ffffff !important;
            border-radius: 10px;
            padding: 11px 14px;
        }

        /* CORRIGIDO: Placeholders com cinza claro nítido */
        .form-control::placeholder {
            color: #b4b4b4 !important;
            opacity: 1;
        }

        .form-control:focus, .form-select:focus {
            background-color: #222222 !important;
            border-color: #ffffff !important;
            color: #ffffff !important;
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.2);
        }

        .form-select option {
            background-color: #1a1a1a !important;
            color: #ffffff !important;
        }

        /* CORRIGIDO: Labels de formulário com cor clara (White/Silver) para leitura ideal */
        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #ffffff !important;
            margin-bottom: 6px;
        }

        .btn-brand {
            background-color: #ffffff;
            color: #000000;
            font-weight: 700;
            border-radius: 10px;
            padding: 12px;
            border: none;
            letter-spacing: 0.5px;
        }

        .btn-brand:hover {
            background-color: #e2e8f0;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark py-3">
        <div class="container justify-content-between align-items-center">
            <a class="navbar-brand text-white d-flex align-items-center gap-2 fw-bold fs-4" href="#">
                <span>Merit<span style="color: var(--accent-color)">Coin</span></span>
            </a>
            <button class="btn btn-sm btn-outline-light border-secondary text-white" onclick="zerarSistema()">
                <i class="fa-solid fa-trash-can me-1"></i> Limpar Dados LocalStorage
            </button>
        </div>
    </nav>

    <div class="auth-container">
        <div class="card p-4 shadow-lg">
            <div class="text-center mb-4">
                <h3 class="auth-title mb-1">Portal de Acesso</h3>
                <p class="auth-subtitle mb-0">Identifique-se para entrar na plataforma acadêmica</p>
            </div>

            <ul class="nav nav-pills nav-justified mb-4" id="authTabs">
                <li class="nav-item">
                    <button class="nav-link active" id="btnTabLogin" onclick="alternarAbas('login')">
                        <i class="fa-solid fa-lock me-1"></i> Entrar
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="btnTabAluno" onclick="alternarAbas('aluno')">
                        <i class="fa-solid fa-user-graduate me-1"></i> Aluno
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="btnTabEmpresa" onclick="alternarAbas('empresa')">
                        <i class="fa-solid fa-building me-1"></i> Empresa
                    </button>
                </li>
            </ul>

            <div id="blockLogin">
                <form id="formLogin">
                    <div class="mb-3">
                        <label class="form-label">Perfil de Conta</label>
                        <select id="loginTipo" class="form-select" required>
                            <option value="ALUNO">Aluno Estudante</option>
                            <option value="PROFESSOR">Professor Docente</option>
                            <option value="EMPRESA">Empresa Parceira</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Usuário / Login</label>
                        <input type="text" id="loginUser" class="form-control" placeholder="Digite seu usuário" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Senha Corporativa</label>
                        <input type="password" id="loginSenha" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-brand w-100">Acessar Painel</button>
                </form>
            </div>

            <div id="blockCadastroAluno" style="display: none;">
                <form id="formCadastroAluno">
                    <div class="mb-2">
                        <label class="form-label">Nome Completo</label>
                        <input type="text" id="cadNome" class="form-control" required>
                    </div>
                    <div class="mb-2">
                        <label class="form-label">E-mail Acadêmico</label>
                        <input type="email" id="cadEmail" class="form-control" required>
                    </div>
                    <div class="row g-2 mb-2">
                        <div class="col-6"><label class="form-label">CPF</label><input type="text" id="cadCpf" class="form-control" required></div>
                        <div class="col-6"><label class="form-label">RG</label><input type="text" id="cadRg" class="form-control" required></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Curso Atual</label>
                        <input type="text" id="cadCurso" class="form-control" placeholder="Ex: Engenharia de Software" required>
                    </div>
                    
                    <div class="row g-2 mb-3 bg-black p-3 rounded-3 border border-secondary">
                        <div class="col-6"><label class="form-label">Definir Usuário</label><input type="text" id="cadLogin" class="form-control" required></div>
                        <div class="col-6"><label class="form-label">Definir Senha</label><input type="password" id="cadSenha" class="form-control" required></div>
                    </div>
                    
                    <button type="submit" class="btn btn-success w-100 py-2 fw-bold">Finalizar Meu Cadastro</button>
                </form>
            </div>

            <div id="blockCadastroEmpresa" style="display: none;">
                <form id="formCadastroEmpresa">
                    <div class="mb-2">
                        <label class="form-label">Razão Social / Fantasia</label>
                        <input type="text" id="empNome" class="form-control" required>
                    </div>
                    <div class="mb-2">
                        <label class="form-label">CNPJ</label>
                        <input type="text" id="empCnpj" class="form-control" required>
                    </div>
                    
                    <div class="row g-2 mb-3 bg-black p-3 rounded-3 border border-secondary">
                        <div class="col-6"><label class="form-label">Login Corporativo</label><input type="text" id="empLogin" class="form-control" required></div>
                        <div class="col-6"><label class="form-label">Senha de Acesso</label><input type="password" id="empSenha" class="form-control" required></div>
                    </div>
                    <button type="submit" class="btn btn-brand w-100">Registrar Empresa Parceira</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        if(!localStorage.getItem('professores')) {
            const professoresIniciais = [
                { login: 'joao.paulo', senha: '1234', nome: 'Professor João Paulo', depto: 'Departamento de Computação', saldo: 1000 },
                { login: 'soraia.puc', senha: '1234', nome: 'Professora Soraia', depto: 'Departamento de Engenharia de Software', saldo: 1000 }
            ];
            localStorage.setItem('professores', JSON.stringify(professoresIniciais));
        }
        if(!localStorage.getItem('alunos')) localStorage.setItem('alunos', JSON.stringify([]));
        if(!localStorage.getItem('empresas')) localStorage.setItem('empresas', JSON.stringify([]));

        function alternarAbas(aba) {
            document.getElementById('btnTabLogin').classList.remove('active');
            document.getElementById('btnTabAluno').classList.remove('active');
            document.getElementById('btnTabEmpresa').classList.remove('active');
            document.getElementById('blockLogin').style.display = 'none';
            document.getElementById('blockCadastroAluno').style.display = 'none';
            document.getElementById('blockCadastroEmpresa').style.display = 'none';

            if(aba === 'login') {
                document.getElementById('btnTabLogin').classList.add('active');
                document.getElementById('blockLogin').style.display = 'block';
            } else if(aba === 'aluno') {
                document.getElementById('btnTabAluno').classList.add('active');
                document.getElementById('blockCadastroAluno').style.display = 'block';
            } else if(aba === 'empresa') {
                document.getElementById('btnTabEmpresa').classList.add('active');
                document.getElementById('blockCadastroEmpresa').style.display = 'block';
            }
        }

        document.getElementById('formLogin').addEventListener('submit', (e) => {
            e.preventDefault();
            const tipo = document.getElementById('loginTipo').value;
            const login = document.getElementById('loginUser').value;
            const senha = document.getElementById('loginSenha').value;

            if (tipo === 'PROFESSOR') {
                const profs = JSON.parse(localStorage.getItem('professores'));
                const p = profs.find(x => x.login === login && x.senha === senha);
                if(p) {
                    sessionStorage.setItem('usuarioLogado', JSON.stringify({ ...p, tipo: 'PROFESSOR' }));
                    window.location.href = 'dashboard.html';
                    return;
                }
            } else if (tipo === 'ALUNO') {
                const alunos = JSON.parse(localStorage.getItem('alunos'));
                const a = alunos.find(x => x.login === login && x.senha === senha);
                if(a) {
                    sessionStorage.setItem('usuarioLogado', JSON.stringify({ ...a, tipo: 'ALUNO' }));
                    window.location.href = 'dashboard.html';
                    return;
                }
            } else if (tipo === 'EMPRESA') {
                const empresas = JSON.parse(localStorage.getItem('empresas'));
                const emp = empresas.find(x => x.login === login && x.senha === senha);
                if(emp) {
                    sessionStorage.setItem('usuarioLogado', JSON.stringify({ ...emp, tipo: 'EMPRESA' }));
                    window.location.href = 'dashboard.html';
                    return;
                }
            }
            alert('Acesso negado. Credenciais incorretas.');
        });

        document.getElementById('formCadastroAluno').addEventListener('submit', (e) => {
            e.preventDefault();
            const alunos = JSON.parse(localStorage.getItem('alunos'));
            const novo = {
                login: document.getElementById('cadLogin').value,
                senha: document.getElementById('cadSenha').value,
                nome: document.getElementById('cadNome').value,
                curso: document.getElementById('cadCurso').value,
                saldo: 0
            };
            alunos.push(novo);
            localStorage.setItem('alunos', JSON.stringify(alunos));
            alert('Conta criada com sucesso!');
            document.getElementById('formCadastroAluno').reset();
            alternarAbas('login');
        });

        document.getElementById('formCadastroEmpresa').addEventListener('submit', (e) => {
            e.preventDefault();
            const empresas = JSON.parse(localStorage.getItem('empresas'));
            const nova = {
                login: document.getElementById('empLogin').value,
                senha: document.getElementById('empSenha').value,
                nome: document.getElementById('empNome').value
            };
            empresas.push(nova);
            localStorage.setItem('empresas', JSON.stringify(empresas));
            alert('Empresa parceira registrada com sucesso!');
            document.getElementById('formCadastroEmpresa').reset();
            alternarAbas('login');
        });

        function zerarSistema() {
            if(confirm('Isso limpará totalmente o armazenamento local das simulações. Deseja continuar?')) {
                localStorage.clear();
                sessionStorage.clear();
                window.location.reload();
            }
        }
    </script>
</body>
</html>
